<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>태블릿 명단 입력</title>
<style>
  body {
    font-family: Arial;
    text-align: center;
    margin-top: 50px;
  }
  input, select, button {
    font-size: 22px;
    padding: 12px;
    margin: 10px;
    width: 300px;
  }
</style>
</head>
<body>

<h2>태블릿 명단 입력</h2>

<select id="device">
  <option value="">태블릿 번호 선택</option>
  <option value="TAB-01">TAB-01</option>
  <option value="TAB-02">TAB-02</option>
  <option value="TAB-03">TAB-03</option>
  <option value="TAB-04">TAB-04</option>
  <option value="TAB-05">TAB-05</option>
  <option value="TAB-06">TAB-06</option>
  <option value="TAB-07">TAB-07</option>
  <option value="TAB-08">TAB-08</option>
  <option value="TAB-09">TAB-09</option>
  <option value="TAB-10">TAB-10</option>
  <option value="TAB-11">TAB-11</option>
  <option value="TAB-12">TAB-12</option>
  <option value="TAB-13">TAB-13</option>
  <option value="TAB-14">TAB-14</option>
  <option value="TAB-15">TAB-15</option>
  <option value="TAB-16">TAB-16</option>
  <option value="TAB-17">TAB-17</option>
  <option value="TAB-18">TAB-18</option>
  <option value="TAB-19">TAB-19</option>
  <option value="TAB-20">TAB-20</option>
  <option value="TAB-21">TAB-21</option>
  <option value="TAB-22">TAB-22</option>
  <option value="TAB-23">TAB-23</option>
  <option value="TAB-24">TAB-24</option>
</select><br>

<input type="text" id="name" placeholder="학생 이름 입력"><br>

<select id="earphone">
  <option value="이어폰 대여 안함">이어폰 대여 안함</option>
  <option value="이어폰 대여함">이어폰 대여함</option>
</select><br>

<select id="status">
  <option value="사용 시작">사용 시작</option>
  <option value="반납">반납</option>
</select><br>

<button onclick="submitData()">기록하기</button>

<script>
function submitData() {
  const device = document.getElementById("device").value;
  const name = document.getElementById("name").value.trim();
  const earphone = document.getElementById("earphone").value;
  const status = document.getElementById("status").value;

  if (!device) {
    alert("태블릿 번호를 선택하세요.");
    return;
  }

  if (!name) {
    alert("학생 이름을 입력하세요.");
    return;
  }

  fetch("https://script.google.com/macros/s/AKfycbx6WECAKKp6cHLd0rAM0fxQfTtsQExScs2379XZa_8ZeK4rML0POwYI7To9-fD-S18F/exec", {
    method: "POST",
    mode: "no-cors",
    body: JSON.stringify({
      name: name,
      device: device,
      earphoneCheck: earphone,
      status: status
    })
  });

  alert("기록 완료!");
  document.getElementById("device").value = "";
  document.getElementById("name").value = "";
}
</script>

</body>
</html>
