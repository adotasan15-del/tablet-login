<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>태블릿 사용 등록</title>
<style>
  body { text-align:center; margin-top:50px; font-size:20px; }
  input, button {
    font-size:20px;
    padding:10px;
    margin:10px;
    width:250px;
  }
</style>
</head>
<body>

<h2 id="deviceTitle"></h2>

<input type="text" id="name" placeholder="이름 입력"><br>

<select id="status">
  <option value="사용 시작">사용 시작</option>
  <option value="반납">반납</option>
</select><br>

<button onclick="submitData()">제출</button>

<script>
// URL에서 device 값 가져오기
const urlParams = new URLSearchParams(window.location.search);
const device = urlParams.get('device');

document.getElementById("deviceTitle").innerText = device + " 사용";

function submitData() {
  const name = document.getElementById("name").value;
  const status = document.getElementById("status").value;

  if (!name) {
    alert("이름 입력하세요");
    return;
  }

  fetch("https://script.google.com/macros/s/AKfycbx6WECAKKp6cHLd0rAM0fxQfTtsQExScs2379XZa_8ZeK4rML0POwYI7To9-fD-S18F/exec", {
    method: "POST",
    body: JSON.stringify({
      name: name,
      device: device,
      status: status
    })
  })
  .then(res => res.json())
  .then(() => {
    alert("기록 완료!");
    document.getElementById("name").value = "";
  });
}
</script>

</body>
</html>
