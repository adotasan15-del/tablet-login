<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>태블릿 명단 입력</title>
<style>
  body {
    font-family: Arial;
    text-align: center;
    margin-top: 50px;
  }
  input, select, button {
    font-size: 22px;
    padding: 12px;
    margin: 10px;
    width: 300px;
  }
</style>
</head>
<body>

<h2>태블릿 명단 입력</h2>

<input type="text" id="device" placeholder="태블릿 번호 입력 예: TAB-01"><br>

<input type="text" id="name" placeholder="학생 이름 입력"><br>

<select id="status">
  <option value="사용 시작">사용 시작</option>
  <option value="반납">반납</option>
</select><br>

<button onclick="submitData()">기록하기</button>

<script>
function submitData() {
  const device = document.getElementById("device").value.trim();
  const name = document.getElementById("name").value.trim();
  const status = document.getElementById("status").value;

  if (!device) {
    alert("태블릿 번호를 입력하세요.");
    return;
  }

  if (!name) {
    alert("학생 이름을 입력하세요.");
    return;
  }

  fetch("https://script.google.com/macros/s/AKfycbx6WECAKKp6cHLd0rAM0fxQfTtsQExScs2379XZa_8ZeK4rML0POwYI7To9-fD-S18F/exec", {
    method: "POST",
    body: JSON.stringify({
      name: name,
      device: device,
      status: status
    })
  })
  .then(res => res.json())
  .then(() => {
    alert("기록 완료!");
    document.getElementById("device").value = "";
    document.getElementById("name").value = "";
  })
  .catch(() => {
    alert("기록 실패. 인터넷 또는 Apps Script 설정을 확인하세요.");
  });
}
</script>

</body>
</html>
