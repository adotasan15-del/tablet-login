<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>태블릿 관리</title>
<style>
body {
  font-family: Arial;
  text-align: center;
  margin-top: 50px;
}
input, select, button {
  font-size: 22px;
  padding: 12px;
  margin: 10px;
  width: 300px;
}
</style>
</head>
<body>

<h2>태블릿 대여 시스템</h2>

<select id="device"></select><br>

<input type="text" id="name" placeholder="학생 이름 입력"><br>

<select id="earphone">
  <option value="이어폰 대여 안함">이어폰 대여 안함</option>
  <option value="이어폰 대여함">이어폰 대여함</option>
</select><br>

<select id="status">
  <option value="사용 시작">사용 시작</option>
  <option value="반납">반납</option>
</select><br>

<button onclick="submitData()">확인</button>

<script>
const URL = "여기에_웹앱_URL";

let tabletData = [];

async function loadData() {
  const res = await fetch(URL);
  tabletData = await res.json();

  const select = document.getElementById("device");
  select.innerHTML = "";

  tabletData.forEach(t => {
    const option = document.createElement("option");
    option.value = t.device;

    if (t.status === "사용중") {
      option.text = t.device + " (사용중)";
    } else {
      option.text = t.device + " (가능)";
    }

    select.appendChild(option);
  });
}

function submitData() {
  const device = document.getElementById("device").value;
  const name = document.getElementById("name").value.trim();
  const earphone = document.getElementById("earphone").value;
  const status = document.getElementById("status").value;

  const tablet = tabletData.find(t => t.device === device);

  if (status === "사용 시작" && tablet.status === "사용중") {
    alert("이미 사용중입니다");
    return;
  }

  fetch(URL, {
    method: "POST",
    mode: "no-cors",
    body: JSON.stringify({
      name,
      device,
      earphone,
      status
    })
  });

  alert("완료");
  setTimeout(loadData, 1000);
}

loadData();
</script>

</body>
</html>
